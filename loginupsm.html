<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Login | Smart Marketing</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
:root {
--bg-dark: #0f172a;
  --bg-darker: #0b1120;
  --card-bg: rgba(255, 255, 255, 0.05);
  --primary: #00f5a0;
  --secondary: #00d9f5;
  --danger: #ff4757;
  --text-light: #ffffff;
  --text-muted: #94a3b8;
  --gradient: linear-gradient(45deg, var(--primary), var(--secondary));
}

* {
margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

html {
scroll-behavior: smooth;
}

body {
background: var(--bg-dark);
  color: var(--text-light);
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

nav {
display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 8%;
  background: rgba(15, 23, 42, 0.9);
  backdrop-filter: blur(12px);
  position: fixed;
  width: 100%;
  z-index: 1000;
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  top: 0;
}

nav h1 {
color: var(--primary);
  transition: 0.4s;
  cursor: pointer;
  font-size: 24px;
}

nav h1:hover {
transform: scale(1.05);
  text-shadow: 0 0 10px rgba(0, 245, 160, 0.4);
}

nav ul {
display: flex;
  list-style: none;
  gap: 30px;
  align-items: center;
}

nav ul li a {
color: var(--text-light);
  text-decoration: none;
  cursor: pointer;
  transition: 0.3s;
  font-weight: 400;
}

nav ul li a:hover {
color: var(--primary);
}

.btn-sub {
background: var(--gradient);
  color: #000;
  border: none;
  border-radius: 20px;
  padding: 10px 20px;
  font-weight: 700;
  cursor: pointer;
  transition: 0.4s;
}

.btn-sub {
width: 100%;
  padding: 15px;
  border-radius: 50px;
  font-size: 16px;
  margin-top: 10px;
}

.btn-sub:hover {
transform: translateY(-3px);
  box-shadow: 0 10px 20px rgba(0, 245, 160, 0.2);
}

table {
width: 100%;
  border-collapse: collapse;
  text-align: left;
}

th {
background: rgba(0, 0, 0, 0.4);
  color: var(--secondary);
  padding: 20px;
  font-weight: 600;
  text-transform: uppercase;
  font-size: 14px;
  letter-spacing: 1px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
}

td {
padding: 20px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  color: var(--text-light);
  vertical-align: middle;
}

tr:hover {
background: rgba(255, 255, 255, 0.02);
}

.auth-page {
display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top, #1e293b, var(--bg-dark));
}

.auth-box {
display: flex;
  background: var(--card-bg);
  border-radius: 20px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(15px);
  width: 800px;
  max-width: 90%;
  box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
  overflow: hidden;
  margin: auto;
}

.auth-image-area {
flex: 1;
  background: rgba(0, 0, 0, 0.2);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 40px;
}

.auth-image-area img {
max-width: 100%;
  border-radius: 15px;
  box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
}

.auth-form-area {
flex: 1;
  padding: 50px 40px;
}

.auth-form-area h2 {
text-align: center;
  margin-bottom: 30px;
  font-size: 24px;
}

.input-grp {
margin-bottom: 20px;
  position: relative;
}

.input-grp input {
width: 100%;
  padding: 15px 20px 15px 45px;
  border-radius: 50px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  background: rgba(0, 0, 0, 0.3);
  color: #fff;
  outline: none;
  transition: 0.3s;
}

.input-grp input:focus {
border-color: var(--primary);
  background: rgba(0, 0, 0, 0.5);
}

.input-icon {
position: absolute;
  left: 18px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 18px;
}

.links-area {
text-align: center;
  margin-top: 20px;
  font-size: 13px;
}

.links-area a {
color: var(--text-muted);
  text-decoration: none;
  transition: 0.3s;
  display: block;
  margin-top: 15px;
}

.links-area a:hover {
color: var(--primary);
}

.switch-link {
margin-top: 30px;
  font-weight: 600;
  font-size: 15px;
}

.back-btn {
position: absolute;
  top: 30px;
  left: 50px;
  color: var(--primary);
  text-decoration: none;
  font-weight: 600;
  transition: 0.3s;
}

.back-btn:hover {
transform: translateX(-5px);
  text-shadow: 0 0 10px rgba(0, 245, 160, 0.4);
}

footer {
text-align: center;
  padding: 40px 20px;
  background: var(--bg-darker);
  color: var(--text-muted);
  border-top: 1px solid rgba(255, 255, 255, 0.05);
  margin-top: auto;
}

</style>
</head>

<body class="auth-page">
    <a href="index.html" class="back-btn">← Back to Home</a>
    <div class="auth-box">
        <div class="auth-image-area">
            <img src="download.png" alt="Login Illustration">
        </div>

        <div class="auth-form-area">
            <h2>Member Login</h2>
            <form id="login-form">
                <div class="input-grp">
                    <span class="input-icon">✉</span>
                    <input type="text" id="email" placeholder="Email">
                </div>
                <div class="input-grp">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="password" placeholder="Password">
                </div>

                <button type="submit" class="btn-sub">LOGIN</button>

                <div class="links-area">
                    <a href="#">Forgot Password?</a>
                    <a href="signupsm.html" class="switch-link">Don't have an account? Sign Up ➔</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('login-form');

        loginForm.addEventListener('submit', function (event) {

            event.preventDefault();

            const emailInput = document.getElementById('email').value;
            const passwordInput = document.getElementById('password').value;

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
          const passreg=/^[a-zA-Z0-9]{8,}$/;



            if (emailInput === "") {
                alert("Please enter your email address.");
                return false;
            }

            if (!emailRegex.test(emailInput)) {
                alert("Please enter a valid email address");
                return false;
            }
            if (!passreg.test(passwordInput)) {
                alert("Please enter a valid password");
                return false;
            }

            if (passwordInput === "") {
                alert("Please enter your password.");
                return false;
            }

            if (passwordInput.length < 6) {
                alert("Password must be at least 6 characters long.");
                return false;
            }
            alert("Login Successfull");
            window.location.href = "index.html";
            return true;
        });
    </script>
</body>

</html>
